name: CI & Publish

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup supported Node.js runtime
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun ci

      - name: Install Chromium for visual goldens
        run: bunx playwright install --with-deps chromium

      - name: Type-check
        run: bun run check

      - name: Build package
        run: bun run build

      - name: Enforce compiler size budget
        run: bun run size

      - name: Run tests with coverage
        shell: bash
        run: |
          set -o pipefail
          echo "### Vitest Test & Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```txt' >> "$GITHUB_STEP_SUMMARY"
          bun run test:coverage | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Kill critical-path mutants
        run: bun run test:mutation

      - name: Verify Chromium visual goldens
        run: bun run test:visual

  publish:
    name: Publish to npm
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun ci

      - name: Verify release tag
        shell: bash
        run: |
          package_version="$(bun -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v${package_version}" ]]; then
            echo "Release tag $GITHUB_REF_NAME does not match package version v${package_version}." >&2
            exit 1
          fi

      - name: Build package
        run: bun run build

      - name: Enforce compiler size budget
        run: bun run size

      - name: Inspect package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
